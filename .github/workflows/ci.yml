name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────
  # Job 1: 테스트 (모든 push/PR에서 실행)
  # ──────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: src/go.mod

      - name: Run tests
        working-directory: src
        run: go test ./... -v -race -count=1

  # ──────────────────────────────────────────
  # Job 2: 빌드 & Docker Hub push
  # main 브랜치 push 시에만 실행
  # ──────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_name: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.kimtaejung }}/gitops-demo-app
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.kimtaejung }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ──────────────────────────────────────────
  # Job 3: manifest-repo dev overlay PR 생성
  # ──────────────────────────────────────────
  update-manifest-dev:
    name: Update Manifest (dev)
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout manifest-repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MANIFEST_REPO }}
          token: ${{ secrets.MANIFEST_REPO_TOKEN }}
          path: manifest-repo

      - name: Update dev overlay image tag
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          kimtaejung: ${{ secrets.kimtaejung }}
        run: |
          KUSTOMIZATION="manifest-repo/overlays/dev/kustomization.yaml"
          # images 블록의 newName, newTag만 정확하게 교체
          sed -i "s|newName:.*gitops-demo-app.*|newName: ${kimtaejung}/gitops-demo-app|" "$KUSTOMIZATION"
          sed -i "s|newTag:.*|newTag: ${IMAGE_TAG}|" "$KUSTOMIZATION"
          echo "Updated to ${kimtaejung}/gitops-demo-app:${IMAGE_TAG}"

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.MANIFEST_REPO_TOKEN }}
          path: manifest-repo
          branch: "auto/update-dev-${{ needs.build-and-push.outputs.image_tag }}"
          base: main
          title: "[dev] Update image → ${{ needs.build-and-push.outputs.image_tag }}"
          body: |
            ## Auto-generated by CI

            | 항목 | 값 |
            |---|---|
            | **Environment** | dev |
            | **Image Tag** | `${{ needs.build-and-push.outputs.image_tag }}` |
            | **Commit** | ${{ github.sha }} |
            | **Workflow** | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            > merge 후 ArgoCD가 gitops-dev namespace에 자동 배포합니다.
          labels: |
            auto-update
            env:dev
          commit-message: "chore: update dev image to ${{ needs.build-and-push.outputs.image_tag }}"
